<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VibeMovie</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=Jura:wght@300..700&family=Nata+Sans:wght@100..900&family=Unbounded:wght@200..900&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>

    <template id="movie-card-template">
      <div class="card">
        <button type="button" class="close-card-button"></button>
        <div class="card-face">
          <section class="card-bottom">
            <h2 class="movie-title"></h2>
            <div class="card-meta">
              <ul class="emotions-rating card-emotions" aria-label="Топ-3 эмоции">
                <li class="emotions-rating-item"><span class="emotion1-emoji"></span> <span class="emotion1-rating">—</span></li>
                <li class="emotions-rating-item"><span class="emotion2-emoji"></span> <span class="emotion2-rating">—</span></li>
                <li class="emotions-rating-item"><span class="emotion3-emoji"></span> <span class="emotion3-rating">—</span></li>
              </ul>
              <p class="card-meta__item movie-country"></p>
              <p class="card-meta__item movie-genres"></p>
            </div>
          </section>

          <section class="additional_info">
            <div class="additional_info__top">
              <h2 class="additional_info__title"></h2>
              <div class="additional_info__director"></div>
              <p class="additional_info__item additional_info__description"></p>
              <p class="additional_info__item additional_info__cast"></p>
              <p class="additional_info__item additional_info__genres"></p>
              <p class="additional_info__item additional_info__rating"></p>
              <div class="additional_info__emotions" aria-label="Рейтинг по эмоциям"></div>
            </div>

            <section class="reviews-section">
              <h3 class="reviews-section__title">Отзывы</h3>
              <div class="reviews-section__input-wrapper">
                <textarea class="reviews-section__input" placeholder="Введите ваш отзыв" rows="3"></textarea>
              </div>
              <div class="reviews-section__emotions-wrapper">
                <div class="emotion-input-container" id="emotion-inputs">
                  <div class="emotion-input-group">
                    <select class="emotion-select">
                      <option value="">Выберите эмоцию</option>
                      <option value="sadness_rating">Грусть 😢</option>
                      <option value="optimism_rating">Оптимизм 😊</option>
                      <option value="fear_rating">Страх 😨</option>
                      <option value="anger_rating">Гнев 😠</option>
                      <option value="neutral_rating">Нейтральность 😐</option>
                      <option value="worry_rating">Беспокойство 😟</option>
                      <option value="love_rating">Любовь ❤️</option>
                      <option value="fun_rating">Веселье 😄</option>
                      <option value="boredom_rating">Скука 😴</option>
                    </select>
                    <select class="rating-select" disabled>
                      <option value="">Оценка</option>
                      <option value="1">1</option>
                      <option value="2">2</option>
                      <option value="3">3</option>
                      <option value="4">4</option>
                      <option value="5">5</option>
                      <option value="6">6</option>
                      <option value="7">7</option>
                      <option value="8">8</option>
                      <option value="9">9</option>
                      <option value="10">10</option>
                    </select>
                    <button type="button" class="emotion-remove-btn" disabled>×</button>
                  </div>
                </div>
                <button type="button" class="emotion-add-btn" id="add-emotion-btn">+ Добавить эмоцию</button>
              </div>
              <button type="button" class="reviews-submit-btn" id="submit-review-btn">Отправить отзыв</button>
              <ul class="reviews-section__list">
                <li class="reviews-section__item">
                  <div class="review-user-info"><span class="review-username"></span></div>
                  <div class="review-emotions">
                    <span class="review-emotion"></span>
                    <span class="review-emotion"></span>
                    <span class="review-emotion"></span>
                  </div>
                  <div class="review-text-container">
                    <p class="review-text"></p>
                    <button type="button" class="review-toggle-btn">Развернуть</button>
                  </div>
                </li>
              </ul>
            </section>
          </section>
        </div>

        <ul class="movie-button-list">
          <li class="movie-button-list-item">
            <button type="button" class="button button-container__yes-button glass-button" data-action="no">Не нравится</button>
          </li>
          <li class="movie-button-list-item center-item">
            <button type="button" class="button button-container__more-button glass-button" data-action="more">Узнать больше</button>
          </li>
          <li class="movie-button-list-item">
            <button type="button" class="button button-container__no-button glass-button" data-action="yes">Нравится</button>
          </li>
        </ul>
      </div>
    </template>

    <script src="/rgbaster.umd.js"></script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
